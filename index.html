<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Explorer — Journey Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14161c;
  --panel:#1d212b;
  --panel-2:#232836;
  --line:#2e3442;
  --text:#e8e4d8;
  --muted:#9aa0ae;
  --brass:#c9a45c;
  --brass-dim:#8a713f;
  --danger:#c0564f;
  --ok:#4f9d55;
  --radius:8px;
  --font-body:'Source Sans 3',system-ui,sans-serif;
  --font-display:'Cinzel',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

/* ---------- layout ---------- */
#app{display:grid;grid-template-rows:52px 1fr;height:100vh}
header{
  display:flex;align-items:center;gap:14px;padding:0 18px;
  border-bottom:1px solid var(--line);background:var(--panel);
}
header h1{
  font-family:var(--font-display);font-size:20px;font-weight:700;
  letter-spacing:.06em;color:var(--brass);white-space:nowrap;
}
header h1 .rune{color:var(--muted);font-weight:600}
#mapName{color:var(--muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .spacer{flex:1}
#main{display:grid;grid-template-columns:248px 1fr 350px;min-height:0}

/* ---------- sidebar ---------- */
aside{
  background:var(--panel);overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:16px;min-height:0;
}
#left{border-right:1px solid var(--line)}
#right{border-left:1px solid var(--line)}
.section h2{
  font-family:var(--font-display);font-size:12px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--brass);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.section h2::after{content:"";flex:1;height:1px;background:var(--line)}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:8px 10px;border-radius:var(--radius);border:1px solid var(--line);
  background:var(--panel-2);color:var(--text);font-size:13px;font-weight:600;
}
.btn:hover{border-color:var(--brass-dim)}
.btn.primary{background:var(--brass);border-color:var(--brass);color:#1a1610}
.btn.primary:hover{background:#d8b46f}
.btn.small{width:auto;padding:4px 9px;font-size:12px;font-weight:600}
.btn.danger:hover{border-color:var(--danger);color:#e8918b}
.btn:focus-visible,.tool:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
.stack{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px;align-items:center}
.hint{color:var(--muted);font-size:12px;line-height:1.45}

/* tools */
.tools{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.tool{
  padding:9px 4px;border-radius:var(--radius);border:1px solid var(--line);
  background:var(--panel-2);color:var(--muted);font-size:12px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.tool svg{width:18px;height:18px;stroke:currentColor}
.tool.active{border-color:var(--brass);color:var(--brass);background:#2a2618}

/* layers */
#tripList{display:flex;flex-direction:column;gap:6px}
.trip{
  display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--radius);
  border:1px solid var(--line);background:var(--panel-2);cursor:pointer;
}
.trip.active{border-color:var(--brass);background:#2a2618}
.trip .eye{background:none;border:none;color:var(--muted);font-size:14px;line-height:1;padding:2px}
.trip .eye.on{color:var(--brass)}
.trip .name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.trip .meta{color:var(--muted);font-size:11px;white-space:nowrap}
.trip .x{background:none;border:none;color:var(--muted);font-size:13px;padding:2px}
.trip .x:hover{color:var(--danger)}

/* ---------- canvas ---------- */
#stage{position:relative;min-width:0;background:
  radial-gradient(1200px 800px at 50% 30%, #1b1f29 0%, var(--ink) 70%)}
#canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block}
#canvas.draw{cursor:crosshair}
#canvas.scale{cursor:crosshair}
#canvas.grab{cursor:grab}
#canvas.grabbing{cursor:grabbing}
#viewbar{
  position:absolute;top:12px;left:12px;display:flex;gap:6px;z-index:5;
}
#viewbar .btn{width:auto;padding:6px 11px;font-size:12px;background:rgba(29,33,43,.92);backdrop-filter:blur(4px)}
#statusbar{
  position:absolute;left:12px;bottom:12px;z-index:5;max-width:70%;
  background:rgba(29,33,43,.92);border:1px solid var(--line);border-radius:var(--radius);
  padding:6px 12px;font-size:12px;color:var(--muted);backdrop-filter:blur(4px);
}
#statusbar b{color:var(--text)}
#dropzone{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:4;color:var(--muted);text-align:center;padding:30px;
}
#dropzone .compass{font-size:54px;color:var(--brass);font-family:var(--font-display)}
#dropzone h3{font-family:var(--font-display);color:var(--text);letter-spacing:.08em;font-weight:600}
#dropzone.hidden{display:none}
#stage.dragover::after{
  content:"Drop map image";position:absolute;inset:10px;border:2px dashed var(--brass);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);letter-spacing:.1em;color:var(--brass);
  background:rgba(20,22,28,.7);z-index:9;
}

/* ---------- journey panel ---------- */
.cartouche{
  border:1px solid var(--brass-dim);border-radius:10px;padding:14px;
  background:
    linear-gradient(180deg, rgba(201,164,92,.08), rgba(201,164,92,0) 60%),
    var(--panel-2);
  text-align:center;position:relative;
}
.cartouche::before,.cartouche::after{
  content:"✦";position:absolute;top:-9px;color:var(--brass);background:var(--panel);
  padding:0 6px;font-size:12px;
}
.cartouche::before{left:14px}
.cartouche::after{right:14px}
.cartouche .big{font-family:var(--font-display);font-size:21px;color:var(--brass);font-weight:700;letter-spacing:.03em}
.cartouche .sub{color:var(--muted);font-size:12px;margin-top:3px}
.cartouche .tot{font-size:15px;margin-top:6px}

.leg-card{
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel-2);
  padding:10px;display:flex;flex-direction:column;gap:8px;
}
.leg-card.selected{border-color:var(--brass)}
.leg-head{display:flex;align-items:center;gap:8px}
.leg-head .swatch{width:11px;height:11px;border-radius:3px;flex:none}
.leg-head .t{font-weight:700;flex:1}
.leg-head .d{color:var(--muted);font-size:12px;white-space:nowrap}
.leg-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
.leg-ctrl select{
  background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:6px;padding:3px 6px;font-size:12px;
}
.leg-ctrl label{display:flex;align-items:center;gap:5px;color:var(--muted);cursor:pointer}
.mode-table{border:1px solid var(--line);border-radius:6px;overflow:hidden}
.mode-group{
  padding:4px 9px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--brass);background:rgba(201,164,92,.07);font-weight:700;
}
.mode-row{
  display:flex;justify-content:space-between;gap:10px;padding:4px 9px;font-size:12px;
  cursor:pointer;border-top:1px solid rgba(46,52,66,.6);
}
.mode-row:hover{background:rgba(201,164,92,.08)}
.mode-row.sel{background:rgba(201,164,92,.16);color:var(--brass);font-weight:700}
.mode-row .time{color:var(--muted)}
.mode-row.sel .time{color:var(--brass)}

/* modal */
#modal{
  position:fixed;inset:0;background:rgba(10,11,15,.6);display:none;
  align-items:center;justify-content:center;z-index:50;
}
#modal.open{display:flex}
#modal .box{
  background:var(--panel);border:1px solid var(--brass-dim);border-radius:12px;
  padding:20px;width:320px;display:flex;flex-direction:column;gap:12px;
}
#modal h3{font-family:var(--font-display);color:var(--brass);font-size:15px;letter-spacing:.05em}
#modal input{
  background:var(--panel-2);border:1px solid var(--line);color:var(--text);
  border-radius:var(--radius);padding:8px 10px;font-size:14px;width:100%;
}
#modal input:focus{outline:none;border-color:var(--brass)}

aside::-webkit-scrollbar{width:8px}
aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
@media (max-width:1100px){#main{grid-template-columns:220px 1fr 300px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="rune">⌖</span> Map Explorer</h1>
    <span id="mapName"></span>
    <div class="spacer"></div>
    <span class="hint" id="scaleBadge">scale not set</span>
  </header>

  <div id="main">
    <!-- ============ LEFT ============ -->
    <aside id="left">
      <div class="section stack">
        <h2>Map</h2>
        <button class="btn primary" id="btnLoadMap">Load map image</button>
        <input type="file" id="fileMap" accept="image/*" hidden>
      </div>

      <div class="section stack">
        <h2>Tools</h2>
        <div class="tools">
          <button class="tool active" id="toolPan" title="Pan, select and edit legs (V)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 12l5-5m-5 5l5 5m-5-5h18m-5-5l5 5m-5 5l5-5M12 3l-2 2m2-2l2 2M12 3v18m-2-2l2 2m2-2l-2 2"/></svg>
            Select
          </button>
          <button class="tool" id="toolDraw" title="Draw a new leg: click to add points, double-click or Enter to finish (D)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 20c4-1 3-6 7-8s8-1 9-6"/><circle cx="4" cy="20" r="1.6"/><circle cx="20" cy="6" r="1.6"/></svg>
            Draw
          </button>
          <button class="tool" id="toolScale" title="Set the map scale: click two points of known distance (S)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 17L17 3l4 4L7 21zM7 13l2 2M10 10l2 2M13 7l2 2"/></svg>
            Scale
          </button>
        </div>
        <p class="hint" id="toolHint"></p>
      </div>

      <div class="section stack">
        <h2>Trips · Layers</h2>
        <div id="tripList"></div>
        <button class="btn" id="btnNewTrip">+ New trip</button>
      </div>

      <div class="section stack">
        <h2>File</h2>
        <button class="btn" id="btnExport">Export journeys (.json)</button>
        <label class="row hint" style="cursor:pointer">
          <input type="checkbox" id="chkEmbed" checked> include map image in export
        </label>
        <button class="btn" id="btnImport">Import journeys (.json)</button>
        <input type="file" id="fileImport" accept=".json,application/json" hidden>
      </div>
    </aside>

    <!-- ============ STAGE ============ -->
    <div id="stage">
      <div id="viewbar">
        <button class="btn" id="zin">Zoom in +</button>
        <button class="btn" id="zout">Zoom out −</button>
        <button class="btn" id="zreset">Reset ⟲</button>
        <button class="btn" id="zfull">Fullscreen ⤢</button>
      </div>
      <canvas id="canvas"></canvas>
      <div id="statusbar"></div>
      <div id="dropzone">
        <div class="compass">✦</div>
        <h3>NO MAP LOADED</h3>
        <p class="hint">Drop an image anywhere on this area,<br>or use <b>Load map image</b>. Then set the <b>Scale</b> tool<br>against the map's scale bar to measure in miles.</p>
      </div>
    </div>

    <!-- ============ RIGHT ============ -->
    <aside id="right">
      <div class="section stack" id="journey"></div>
    </aside>
  </div>
</div>

<!-- modal -->
<div id="modal" role="dialog" aria-modal="true">
  <div class="box">
    <h3 id="modalTitle">Set scale</h3>
    <p class="hint" id="modalText"></p>
    <input id="modalInput" type="text" inputmode="decimal" autocomplete="off">
    <div class="row">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn primary" id="modalOk">OK</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* =================================================================
   Travel modes — miles per day (5e-style overland & vehicle paces).
   Edit these numbers to taste. `Infinity` renders as "Instant".
================================================================= */
const MODE_GROUPS = [
  { group:"On Foot", terrain:true, modes:[
    {name:"Normal", mpd:24}, {name:"Fast", mpd:30}, {name:"Slow", mpd:18} ]},
  { group:"By Water", terrain:false, modes:[
    {name:"Barge", mpd:12}, {name:"Keelboat", mpd:24}, {name:"Rowboat", mpd:36},
    {name:"Galley", mpd:96}, {name:"Longship", mpd:72}, {name:"Sailing Ship", mpd:120},
    {name:"Warship", mpd:60} ]},
  { group:"Special", terrain:false, modes:[
    {name:"Airship", mpd:192}, {name:"Flying Mount", mpd:66}, {name:"Teleport", mpd:Infinity} ]},
];
const ALL_MODES = {};
MODE_GROUPS.forEach(g => g.modes.forEach(m => ALL_MODES[m.name] = {mpd:m.mpd, terrain:g.terrain}));

const LEG_COLORS = ["#d33f3f","#d97b2f","#c9a45c","#4f9d55","#3f76d3","#8a5fd3","#1b1b1b","#f5f0e6"];
const COLOR_NAMES = ["Red","Orange","Gold","Green","Blue","Purple","Black","White"];

/* ============================ state ============================ */
const state = {
  img: null, imgDataURL: null, mapName: "",
  view: { s: 1, x: 0, y: 0 },
  pxPerMile: null,
  trips: [],                 // {id,name,visible,legs:[{id,points,color,mode,difficult}]}
  activeTripId: null,
  selectedLegId: null,
  tool: "pan",               // pan | draw | scale
  drawing: [],               // map-space points of leg being drawn
  scalePts: [],
  mouse: null,               // last map-space mouse pos (for preview)
  drag: null,
};
let uid = 1; const nid = () => "id" + (uid++);

/* ============================ canvas ============================ */
const stage = document.getElementById("stage");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let DPR = window.devicePixelRatio || 1;

function resize(){
  DPR = window.devicePixelRatio || 1;
  const r = stage.getBoundingClientRect();
  canvas.width  = Math.max(1, Math.round(r.width  * DPR));
  canvas.height = Math.max(1, Math.round(r.height * DPR));
  render();
}
new ResizeObserver(resize).observe(stage);

const toScreen = p => ({ x: p.x * state.view.s + state.view.x,
                         y: p.y * state.view.s + state.view.y });
const toMap    = p => ({ x: (p.x - state.view.x) / state.view.s,
                         y: (p.y - state.view.y) / state.view.s });

function fitView(){
  if (!state.img) return;
  const w = canvas.width / DPR, h = canvas.height / DPR;
  const s = Math.min(w / state.img.width, h / state.img.height) * 0.95;
  state.view.s = s;
  state.view.x = (w - state.img.width  * s) / 2;
  state.view.y = (h - state.img.height * s) / 2;
}
function zoomAt(cx, cy, factor){
  const min = 0.02, max = 40;
  const ns = Math.min(max, Math.max(min, state.view.s * factor));
  const k = ns / state.view.s;
  state.view.x = cx - (cx - state.view.x) * k;
  state.view.y = cy - (cy - state.view.y) * k;
  state.view.s = ns;
  render();
}

/* ============================ drawing ============================ */
function drawPath(points, color, width, dashed){
  if (points.length < 2) return;
  ctx.beginPath();
  const p0 = toScreen(points[0]); ctx.moveTo(p0.x, p0.y);
  for (let i=1;i<points.length;i++){ const p = toScreen(points[i]); ctx.lineTo(p.x,p.y); }
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.setLineDash(dashed ? [7,6] : []);
  ctx.lineWidth = width + 2.5; ctx.strokeStyle = "rgba(20,16,8,.55)"; ctx.stroke();
  ctx.lineWidth = width; ctx.strokeStyle = color; ctx.stroke();
  ctx.setLineDash([]);
}
function drawDot(p, r, fill, ring){
  const s = toScreen(p);
  ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill();
  if (ring){ ctx.lineWidth = 1.6; ctx.strokeStyle = ring; ctx.stroke(); }
}
function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,canvas.width/DPR,canvas.height/DPR);
  if (!state.img) return;
  ctx.imageSmoothingEnabled = state.view.s < 3;
  ctx.drawImage(state.img, state.view.x, state.view.y,
    state.img.width*state.view.s, state.img.height*state.view.s);

  // legs of visible trips
  for (const trip of state.trips){
    if (!trip.visible) continue;
    for (const leg of trip.legs){
      const sel = leg.id === state.selectedLegId;
      drawPath(leg.points, leg.color, sel ? 4 : 3, false);
      const a = leg.points[0], b = leg.points[leg.points.length-1];
      drawDot(a, sel?5:4, leg.color, "#14161c");
      drawX(b, leg.color);
      if (sel) for (const p of leg.points) drawDot(p, 5, "#f5f0e6", "#14161c");
    }
  }
  // leg in progress
  if (state.drawing.length){
    const pts = state.mouse ? [...state.drawing, state.mouse] : state.drawing;
    drawPath(pts, activeTrip() ? nextLegColor(activeTrip()) : "#d33f3f", 3, true);
    for (const p of state.drawing) drawDot(p, 4, "#f5f0e6", "#14161c");
  }
  // scale points
  if (state.tool === "scale" && state.scalePts.length){
    const pts = state.scalePts.length===1 && state.mouse ? [...state.scalePts, state.mouse] : state.scalePts;
    drawPath(pts, "#c9a45c", 2.5, true);
    for (const p of state.scalePts) drawDot(p, 5, "#c9a45c", "#14161c");
  }
}
function drawX(p, color){
  const s = toScreen(p), r = 6;
  ctx.lineCap="round";
  ctx.lineWidth = 5; ctx.strokeStyle = "rgba(20,16,8,.55)";
  ctx.beginPath();
  ctx.moveTo(s.x-r,s.y-r); ctx.lineTo(s.x+r,s.y+r);
  ctx.moveTo(s.x+r,s.y-r); ctx.lineTo(s.x-r,s.y+r); ctx.stroke();
  ctx.lineWidth = 3; ctx.strokeStyle = color; ctx.stroke();
}

/* ============================ geometry ============================ */
const dist2 = (a,b)=>{const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy};
function segDist(p, a, b){
  const l2 = dist2(a,b);
  if (!l2) return Math.sqrt(dist2(p,a));
  let t = ((p.x-a.x)*(b.x-a.x)+(p.y-a.y)*(b.y-a.y))/l2;
  t = Math.max(0, Math.min(1, t));
  return Math.sqrt(dist2(p, {x:a.x+t*(b.x-a.x), y:a.y+t*(b.y-a.y)}));
}
function legLengthPx(leg){
  let d = 0;
  for (let i=1;i<leg.points.length;i++) d += Math.sqrt(dist2(leg.points[i-1], leg.points[i]));
  return d;
}
function legMiles(leg){
  return state.pxPerMile ? legLengthPx(leg)/state.pxPerMile : null;
}
// hit test in SCREEN space; returns {trip, leg} or null
function hitLeg(sp){
  const tol = 7;
  for (let t = state.trips.length-1; t >= 0; t--){
    const trip = state.trips[t];
    if (!trip.visible) continue;
    for (let l = trip.legs.length-1; l >= 0; l--){
      const leg = trip.legs[l];
      for (let i=1;i<leg.points.length;i++){
        if (segDist(sp, toScreen(leg.points[i-1]), toScreen(leg.points[i])) <= tol)
          return {trip, leg};
      }
    }
  }
  return null;
}
function hitVertex(sp, leg){
  for (let i=0;i<leg.points.length;i++)
    if (Math.sqrt(dist2(sp, toScreen(leg.points[i]))) <= 9) return i;
  return -1;
}

/* ============================ trips & legs ============================ */
function activeTrip(){ return state.trips.find(t => t.id === state.activeTripId) || null; }
function findLeg(id){
  for (const t of state.trips) for (const l of t.legs) if (l.id===id) return {trip:t, leg:l};
  return null;
}
function newTrip(name){
  const t = { id:nid(), name: name || ("Trip " + (state.trips.length+1)), visible:true, legs:[] };
  state.trips.push(t);
  state.activeTripId = t.id;
  refresh();
  return t;
}
function nextLegColor(trip){ return LEG_COLORS[trip.legs.length % LEG_COLORS.length]; }
function finishLeg(){
  if (state.drawing.length >= 2){
    const trip = activeTrip() || newTrip();
    const leg = { id:nid(), points: state.drawing, color: nextLegColor(trip),
                  mode: null, difficult: false };
    trip.legs.push(leg);
    state.selectedLegId = leg.id;
  }
  state.drawing = [];
  refresh();
}
function deleteLeg(id){
  const f = findLeg(id); if (!f) return;
  f.trip.legs = f.trip.legs.filter(l => l.id !== id);
  if (state.selectedLegId === id) state.selectedLegId = null;
  refresh();
}

/* ============================ time math ============================ */
function legDays(leg){
  const mi = legMiles(leg);
  if (mi == null || !leg.mode) return null;
  const m = ALL_MODES[leg.mode]; if (!m) return null;
  if (!isFinite(m.mpd)) return 0;
  const mpd = m.mpd * (leg.difficult && m.terrain ? 0.5 : 1);
  return mi / mpd;
}
function fmtDays(d){
  if (d === 0) return "Instant";
  if (d == null) return "?";
  if (d < 1) return Math.max(1, Math.round(d*24)) + " hours";
  let r = Math.round(d);
  if (r < 1) r = 1;
  const months = Math.floor(r/30); r %= 30;
  const weeks = Math.floor(r/7);
  const days = r % 7;
  const parts = [];
  if (months) parts.push(months + (months>1?" months":" month"));
  if (weeks)  parts.push(weeks  + (weeks >1?" weeks":" week"));
  if (days && parts.length < 2) parts.push(days + (days>1?" days":" day"));
  return parts.slice(0,2).join(", ");
}
function fmtMiles(mi){
  if (mi == null) return "—";
  return (mi >= 100 ? Math.round(mi) : Math.round(mi*10)/10).toLocaleString("en-US") + " miles";
}
function modeTime(leg, modeName){
  const mi = legMiles(leg); if (mi == null) return "—";
  const m = ALL_MODES[modeName];
  if (!isFinite(m.mpd)) return "Instant";
  const mpd = m.mpd * (leg.difficult && m.terrain ? 0.5 : 1);
  return fmtDays(mi/mpd);
}

/* ============================ UI: left panel ============================ */
const $ = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function renderTrips(){
  const box = $("tripList");
  if (!state.trips.length){
    box.innerHTML = '<p class="hint">No trips yet. Draw a leg or press <b>+ New trip</b>.</p>';
    return;
  }
  box.innerHTML = state.trips.map(t => `
    <div class="trip ${t.id===state.activeTripId?"active":""}" data-id="${t.id}">
      <button class="eye ${t.visible?"on":""}" data-act="eye" title="Show / hide">${t.visible?"◉":"◌"}</button>
      <span class="name" data-act="name" title="Double-click to rename">${esc(t.name)}</span>
      <span class="meta">${t.legs.length} leg${t.legs.length===1?"":"s"}</span>
      <button class="x" data-act="del" title="Delete trip">✕</button>
    </div>`).join("");
}
$("tripList").addEventListener("click", async e => {
  const row = e.target.closest(".trip"); if (!row) return;
  const trip = state.trips.find(t => t.id === row.dataset.id); if (!trip) return;
  const act = e.target.dataset.act;
  if (act === "eye"){
    trip.visible = !trip.visible;
    if (!trip.visible){
      const f = state.selectedLegId && findLeg(state.selectedLegId);
      if (f && f.trip === trip) state.selectedLegId = null;
    }
    refresh(); return;
  }
  if (act === "del"){
    const ok = await modalConfirm("Delete trip",
      `Delete <b>${esc(trip.name)}</b> and its ${trip.legs.length} leg(s)? This cannot be undone.`);
    if (ok){
      state.trips = state.trips.filter(t => t !== trip);
      if (state.activeTripId === trip.id) state.activeTripId = state.trips[0]?.id || null;
      if (!(state.selectedLegId && findLeg(state.selectedLegId))) state.selectedLegId = null;
      refresh();
    }
    return;
  }
  state.activeTripId = trip.id; refresh();
});
$("tripList").addEventListener("dblclick", async e => {
  const row = e.target.closest(".trip"); if (!row) return;
  const trip = state.trips.find(t => t.id === row.dataset.id); if (!trip) return;
  const n = await openModal({title:"Rename trip", input:true, value:trip.name, ok:"Rename"});
  if (n && n.trim()){ trip.name = n.trim(); refresh(); }
});
$("btnNewTrip").addEventListener("click", () => newTrip());

/* ============================ UI: journey panel ============================ */
function renderJourney(){
  const box = $("journey");
  const trip = activeTrip();
  if (!trip){
    box.innerHTML = '<h2>Your Journey</h2><p class="hint">Create a trip and draw legs on the map to plan a journey.</p>';
    return;
  }
  let totMi = 0, totDays = 0, anyMi = true, anyTime = true;
  for (const leg of trip.legs){
    const mi = legMiles(leg);
    if (mi == null) anyMi = false; else totMi += mi;
    const d = legDays(leg);
    if (d == null) anyTime = false; else totDays += d;
  }
  if (!trip.legs.length){ anyMi = false; anyTime = false; }

  let html = `<h2>Your Journey</h2>
    <div class="cartouche">
      <div class="big">${esc(trip.name)}</div>
      <div class="sub">Distance</div>
      <div class="tot">${anyMi ? fmtMiles(totMi) : (state.pxPerMile ? "—" : "set scale to measure")}</div>
      <div class="sub">Total time</div>
      <div class="tot">${anyTime ? fmtDays(totDays) : "?"}</div>
    </div>
    <p class="hint">Travel times use the miles-per-day paces defined in the script header (5e-style).
    The total appears once every leg has a mode of travel selected.
    Difficult terrain halves on-foot paces.</p>`;

  html += trip.legs.map((leg, i) => {
    const colorOpts = LEG_COLORS.map((c,k) =>
      `<option value="${c}" ${leg.color===c?"selected":""}>${COLOR_NAMES[k]}</option>`).join("");
    const groups = MODE_GROUPS.map(g => `
      <div class="mode-group">${g.group}</div>
      ${g.modes.map(m => `
        <div class="mode-row ${leg.mode===m.name?"sel":""}" data-leg="${leg.id}" data-mode="${esc(m.name)}">
          <span>${m.name}</span><span class="time">${modeTime(leg, m.name)}</span>
        </div>`).join("")}`).join("");
    return `
    <div class="leg-card ${leg.id===state.selectedLegId?"selected":""}" data-leg="${leg.id}">
      <div class="leg-head">
        <span class="swatch" style="background:${leg.color}"></span>
        <span class="t">Leg ${i+1}</span>
        <span class="d">${state.pxPerMile ? fmtMiles(legMiles(leg)) : Math.round(legLengthPx(leg)) + " px"}</span>
      </div>
      <div class="leg-ctrl">
        <select data-act="color" data-leg="${leg.id}" title="Leg color">${colorOpts}</select>
        <label><input type="checkbox" data-act="terrain" data-leg="${leg.id}" ${leg.difficult?"checked":""}> Difficult terrain</label>
        <button class="btn small danger" data-act="delleg" data-leg="${leg.id}">Delete</button>
      </div>
      <div class="mode-table">${groups}</div>
    </div>`;
  }).join("");

  box.innerHTML = html;
}
$("journey").addEventListener("click", async e => {
  const modeRow = e.target.closest(".mode-row");
  if (modeRow){
    const f = findLeg(modeRow.dataset.leg);
    if (f){ f.leg.mode = f.leg.mode === modeRow.dataset.mode ? null : modeRow.dataset.mode; refresh(); }
    return;
  }
  const btn = e.target.closest("[data-act='delleg']");
  if (btn){
    const id = btn.dataset.leg;
    if (await modalConfirm("Delete leg", "Delete this leg? This cannot be undone.")) deleteLeg(id);
    return;
  }
  const card = e.target.closest(".leg-card");
  if (card && !e.target.closest("select,label,input")){
    state.selectedLegId = card.dataset.leg; refresh();
  }
});
$("journey").addEventListener("change", e => {
  const el = e.target, f = el.dataset.leg && findLeg(el.dataset.leg);
  if (!f) return;
  if (el.dataset.act === "color")   f.leg.color = el.value;
  if (el.dataset.act === "terrain") f.leg.difficult = el.checked;
  refresh();
});

/* ============================ status / hints ============================ */
const HINTS = {
  pan:  "Drag to pan · wheel to zoom · <b>click a leg</b> to select it, then drag it or its points · double-click a point to remove it · <b>Del</b> deletes the leg",
  draw: "<b>Click</b> to add points · <b>double-click / Enter</b> to finish the leg · <b>Backspace</b> undoes a point · <b>Esc</b> cancels · drag to pan",
  scale:"Click <b>two points</b> over the map's scale bar (or any known distance), then enter the distance in miles",
};
function renderStatus(){
  $("toolHint").innerHTML = HINTS[state.tool];
  const parts = [];
  if (!state.img) parts.push("no map loaded");
  parts.push(state.pxPerMile
    ? `<b>${(state.pxPerMile).toFixed(2)} px / mile</b>`
    : "<b>scale not set</b> — distances unavailable");
  if (state.tool === "draw" && state.drawing.length){
    const pts = state.mouse ? [...state.drawing, state.mouse] : state.drawing;
    const fake = {points: pts};
    parts.push(`drawing: ${state.drawing.length} pts, ${state.pxPerMile ? fmtMiles(legMiles(fake)) : Math.round(legLengthPx(fake)) + " px"}`);
  }
  $("statusbar").innerHTML = parts.join(" · ");
  $("scaleBadge").textContent = state.pxPerMile ? `1 mile = ${state.pxPerMile.toFixed(2)} px` : "scale not set";
}
function refresh(){ renderTrips(); renderJourney(); renderStatus(); render(); }

/* ============================ tools ============================ */
function setTool(t){
  if (state.tool === "draw" && t !== "draw") state.drawing = [];
  state.tool = t;
  state.scalePts = [];
  ["toolPan","toolDraw","toolScale"].forEach(id =>
    $(id).classList.toggle("active", id === "tool" + t[0].toUpperCase() + t.slice(1)));
  canvas.className = t === "pan" ? "grab" : t;
  refresh();
}
$("toolPan").addEventListener("click", () => setTool("pan"));
$("toolDraw").addEventListener("click", () => setTool("draw"));
$("toolScale").addEventListener("click", () => setTool("scale"));

/* ============================ pointer interaction ============================ */
const pointers = new Map();
let pinch = null;

canvas.addEventListener("pointerdown", e => {
  canvas.setPointerCapture(e.pointerId);
  const sp = {x:e.offsetX, y:e.offsetY};
  pointers.set(e.pointerId, sp);
  if (pointers.size === 2){
    const [a,b] = [...pointers.values()];
    pinch = { d: Math.sqrt(dist2(a,b)), mid: {x:(a.x+b.x)/2,y:(a.y+b.y)/2} };
    state.drag = null;
    return;
  }
  if (!state.img) return;

  let mode = "pan", data = null;
  if (state.tool === "pan" && state.selectedLegId){
    const f = findLeg(state.selectedLegId);
    if (f){
      const vi = hitVertex(sp, f.leg);
      if (vi >= 0){ mode = "vertex"; data = {leg:f.leg, vi}; }
      else {
        let onBody = false;
        for (let i=1;i<f.leg.points.length;i++)
          if (segDist(sp, toScreen(f.leg.points[i-1]), toScreen(f.leg.points[i])) <= 7){ onBody = true; break; }
        if (onBody){ mode = "leg"; data = {leg:f.leg, start: toMap(sp), orig: f.leg.points.map(p=>({...p}))}; }
      }
    }
  }
  state.drag = { mode, data, sx:sp.x, sy:sp.y, lx:sp.x, ly:sp.y, moved:false };
  if (state.tool === "pan" && mode === "pan") canvas.className = "grabbing";
});

canvas.addEventListener("pointermove", e => {
  const sp = {x:e.offsetX, y:e.offsetY};
  state.mouse = toMap(sp);
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, sp);

  if (pinch && pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.sqrt(dist2(a,b));
    const mid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
    if (pinch.d > 0) zoomAt(mid.x, mid.y, d / pinch.d);
    state.view.x += mid.x - pinch.mid.x;
    state.view.y += mid.y - pinch.mid.y;
    pinch = { d, mid };
    render(); return;
  }

  if (state.drag){
    const dx = sp.x - state.drag.lx, dy = sp.y - state.drag.ly;
    if (Math.abs(sp.x - state.drag.sx) + Math.abs(sp.y - state.drag.sy) > 4) state.drag.moved = true;
    if (state.drag.moved){
      if (state.drag.mode === "pan"){
        state.view.x += dx; state.view.y += dy;
      } else if (state.drag.mode === "vertex"){
        state.drag.data.leg.points[state.drag.data.vi] = toMap(sp);
      } else if (state.drag.mode === "leg"){
        const cur = toMap(sp);
        const ox = cur.x - state.drag.data.start.x, oy = cur.y - state.drag.data.start.y;
        state.drag.data.leg.points = state.drag.data.orig.map(p => ({x:p.x+ox, y:p.y+oy}));
      }
    }
    state.drag.lx = sp.x; state.drag.ly = sp.y;
  }
  if (state.drag?.moved && state.drag.mode !== "pan") { renderJourney(); renderStatus(); }
  else if (state.tool === "draw" && state.drawing.length) renderStatus();
  render();
});

function endPointer(e){
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinch = null;
  if (!state.drag) return;
  const wasClick = !state.drag.moved;
  const sp = {x:e.offsetX, y:e.offsetY};
  const mode = state.drag.mode;
  state.drag = null;
  if (state.tool === "pan") canvas.className = "grab";
  if (!wasClick){ if (mode !== "pan") refresh(); return; }
  if (!state.img) return;

  // ---- clicks ----
  if (state.tool === "draw"){
    state.drawing.push(toMap(sp));
    renderStatus(); render();
  } else if (state.tool === "scale"){
    state.scalePts.push(toMap(sp));
    render();
    if (state.scalePts.length === 2) askScaleDistance();
  } else { // pan/select
    const hit = hitLeg(sp);
    state.selectedLegId = hit ? hit.leg.id : null;
    if (hit) state.activeTripId = hit.trip.id;
    refresh();
  }
}
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);

canvas.addEventListener("dblclick", e => {
  const sp = {x:e.offsetX, y:e.offsetY};
  if (state.tool === "draw"){
    // the double-click added a duplicate point — drop it
    if (state.drawing.length >= 2){
      const last = toScreen(state.drawing[state.drawing.length-1]);
      const prev = toScreen(state.drawing[state.drawing.length-2]);
      if (Math.sqrt(dist2(last, prev)) < 5) state.drawing.pop();
    }
    finishLeg();
  } else if (state.tool === "pan" && state.selectedLegId){
    const f = findLeg(state.selectedLegId);
    if (f && f.leg.points.length > 2){
      const vi = hitVertex(sp, f.leg);
      if (vi >= 0){ f.leg.points.splice(vi,1); refresh(); }
    }
  }
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  zoomAt(e.offsetX, e.offsetY, e.deltaY < 0 ? 1.12 : 1/1.12);
}, {passive:false});

window.addEventListener("keydown", e => {
  if (e.target.matches("input,select,textarea")) return;
  if ($("modal").classList.contains("open")){
    if (e.key === "Escape") closeModal(false);
    return;
  }
  if (e.key === "Escape"){
    state.drawing = []; state.scalePts = []; state.selectedLegId = null; refresh();
  }
  else if (e.key === "Enter" && state.tool === "draw") finishLeg();
  else if (e.key === "Backspace" && state.tool === "draw" && state.drawing.length){
    e.preventDefault(); state.drawing.pop(); renderStatus(); render();
  }
  else if ((e.key === "Delete" || e.key === "Backspace") && state.selectedLegId && state.tool === "pan"){
    e.preventDefault(); deleteLeg(state.selectedLegId);
  }
  else if (e.key === "v" || e.key === "V") setTool("pan");
  else if (e.key === "d" || e.key === "D") setTool("draw");
  else if (e.key === "s" || e.key === "S") setTool("scale");
});

/* ============================ view buttons ============================ */
$("zin").addEventListener("click", () => zoomAt(canvas.width/DPR/2, canvas.height/DPR/2, 1.3));
$("zout").addEventListener("click", () => zoomAt(canvas.width/DPR/2, canvas.height/DPR/2, 1/1.3));
$("zreset").addEventListener("click", () => { fitView(); render(); });
$("zfull").addEventListener("click", () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else stage.requestFullscreen?.();
});

/* ============================ modal ============================ */
let modalResolve = null, modalHasInput = false;
// opts: {title, text, input, value, placeholder, ok, cancel}
// resolves: input modal -> string | null; confirm -> true | null
function openModal(opts){
  modalHasInput = !!opts.input;
  $("modalTitle").textContent = opts.title || "";
  $("modalText").innerHTML = opts.text || "";
  $("modalOk").textContent = opts.ok || "OK";
  $("modalCancel").style.display = opts.cancel === false ? "none" : "";
  const inp = $("modalInput");
  inp.style.display = modalHasInput ? "" : "none";
  inp.value = opts.value || ""; inp.placeholder = opts.placeholder || "";
  $("modal").classList.add("open");
  setTimeout(() => (modalHasInput ? inp : $("modalOk")).focus(), 0);
  return new Promise(res => modalResolve = res);
}
function closeModal(confirmed){
  $("modal").classList.remove("open");
  if (modalResolve){
    modalResolve(confirmed ? (modalHasInput ? $("modalInput").value : true) : null);
    modalResolve = null;
  }
}
const modalConfirm = (title, text, ok) => openModal({title, text, ok: ok || "Delete"});
const modalInfo = (title, text) => openModal({title, text, cancel:false});
$("modalOk").addEventListener("click", () => closeModal(true));
$("modalCancel").addEventListener("click", () => closeModal(false));
$("modalInput").addEventListener("keydown", e => {
  if (e.key === "Enter") closeModal(true);
  if (e.key === "Escape") closeModal(false);
  e.stopPropagation();
});
async function askScaleDistance(){
  const [a,b] = state.scalePts;
  const px = Math.sqrt(dist2(a,b));
  const val = await openModal({
    title: "Set scale", input: true, ok: "Set scale", placeholder: "e.g. 200",
    text: `The two points are <b>${Math.round(px)} px</b> apart on the map image. How many <b>miles</b> is that in your world?`,
  });
  state.scalePts = [];
  const miles = parseFloat(String(val).replace(",", "."));
  if (val != null && miles > 0){
    state.pxPerMile = px / miles;
    setTool("pan");
  }
  refresh();
}

/* ============================ map loading ============================ */
function loadMapFile(file){
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      state.img = img;
      state.imgDataURL = reader.result;
      state.mapName = file.name;
      $("mapName").textContent = file.name;
      $("dropzone").classList.add("hidden");
      fitView(); refresh();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
$("btnLoadMap").addEventListener("click", () => $("fileMap").click());
$("fileMap").addEventListener("change", e => { loadMapFile(e.target.files[0]); e.target.value=""; });

["dragover","dragenter"].forEach(ev => stage.addEventListener(ev, e => {
  e.preventDefault(); stage.classList.add("dragover");
}));
["dragleave","drop"].forEach(ev => stage.addEventListener(ev, e => {
  e.preventDefault(); stage.classList.remove("dragover");
}));
stage.addEventListener("drop", e => {
  const f = e.dataTransfer.files?.[0];
  if (f?.type === "application/json" || f?.name?.endsWith(".json")) importFile(f);
  else loadMapFile(f);
});

/* ============================ import / export ============================ */
$("btnExport").addEventListener("click", () => {
  const data = {
    app: "map-explorer", version: 1,
    mapName: state.mapName || null,
    pxPerMile: state.pxPerMile,
    trips: state.trips.map(t => ({
      name: t.name, visible: t.visible,
      legs: t.legs.map(l => ({
        points: l.points.map(p => ({x:+p.x.toFixed(2), y:+p.y.toFixed(2)})),
        color: l.color, mode: l.mode, difficult: l.difficult
      }))
    })),
  };
  if ($("chkEmbed").checked && state.imgDataURL) data.mapImage = state.imgDataURL;
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (state.mapName ? state.mapName.replace(/\.[^.]+$/,"") : "journeys") + ".map-explorer.json";
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
});

$("btnImport").addEventListener("click", () => $("fileImport").click());
$("fileImport").addEventListener("change", e => { importFile(e.target.files[0]); e.target.value=""; });

function importFile(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if (data.app !== "map-explorer") throw new Error("Not a Map Explorer file");
      state.pxPerMile = data.pxPerMile ?? state.pxPerMile;
      state.trips = (data.trips || []).map(t => ({
        id: nid(), name: t.name || "Trip", visible: t.visible !== false,
        legs: (t.legs || []).map(l => ({
          id: nid(),
          points: (l.points || []).map(p => ({x:+p.x, y:+p.y}))
                                  .filter(p => isFinite(p.x) && isFinite(p.y)),
          color: l.color || LEG_COLORS[0],
          mode: ALL_MODES[l.mode] ? l.mode : null,
          difficult: !!l.difficult,
        })).filter(l => l.points.length >= 2),
      }));
      state.activeTripId = state.trips[0]?.id || null;
      state.selectedLegId = null;
      if (data.mapImage){
        const img = new Image();
        img.onload = () => {
          state.img = img; state.imgDataURL = data.mapImage;
          state.mapName = data.mapName || "imported map";
          $("mapName").textContent = state.mapName;
          $("dropzone").classList.add("hidden");
          fitView(); refresh();
        };
        img.src = data.mapImage;
      } else refresh();
    }catch(err){
      modalInfo("Import failed", "Could not import file: " + esc(err.message));
    }
  };
  reader.readAsText(file);
}

/* ============================ boot ============================ */
setTool("pan");
resize();
refresh();
</script>
